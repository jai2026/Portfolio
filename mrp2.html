<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 40px;
    }
    .calculator {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      width: 100%;
      margin: 10px 0;
      font-size: 16px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #218838;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h2>MRP Discount + GST Calculator</h2>
    <label>Enter MRP:</label>
    <input type="number" id="mrp" placeholder="e.g. 1000">

    <label>Enter Discount Percentage (%):</label>
    <input type="number" id="discount" placeholder="e.g. 20">

    <label>Enter GST Percentage (%):</label>
    <input type="number" id="gst" placeholder="e.g. 18">

    <button onclick="calculate()">Calculate Final Price</button>

    <div class="result" id="finalPrice"></div>
  </div>

  <script>
    function calculate() {
      const mrp = parseFloat(document.getElementById('mrp').value);
      const discount = parseFloat(document.getElementById('discount').value);
      const gst = parseFloat(document.getElementById('gst').value);

      if (isNaN(mrp) || isNaN(discount) || isNaN(gst)) {
        document.getElementById('finalPrice').innerText = 'Please enter all values correctly.';
        return;
      }

      // Apply discount
      const priceAfterDiscount = mrp - (mrp * discount / 100);

      // Remove GST from the discounted price
      const finalPrice = priceAfterDiscount - (priceAfterDiscount * gst / 100);

      document.getElementById('finalPrice').innerText = 
        `Final Price after ${discount}% discount and ${gst}% GST reduction is ₹${finalPrice.toFixed(2)}`;
    }
  </script>

</body>
</html>
