<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discounted Price after GST Removed</title>
  <style>
    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .calculator {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #555;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      width: 100%;
      background-color: #007bff;
      color: white;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #0069d9;
    }
    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 16px;
      line-height: 1.6;
      color: #222;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h2>Final Price After Discount & GST Removed</h2>

    <div class="form-group">
      <label for="mrp">Enter MRP (₹):</label>
      <input type="number" id="mrp" placeholder="e.g. 1000">
    </div>

    <div class="form-group">
      <label for="discount">Discount Percentage (%):</label>
      <input type="number" id="discount" placeholder="e.g. 20">
    </div>

    <div class="form-group">
      <label for="gst">Select GST Rate:</label>
      <select id="gst">
        <option value="18">18%</option>
        <option value="14">14%</option>
      </select>
    </div>

    <button onclick="calculate()">Calculate Final Price</button>

    <div id="result"></div>
  </div>

  <script>
    function calculate() {
      const mrp = parseFloat(document.getElementById("mrp").value);
      const discount = parseFloat(document.getElementById("discount").value);
      const gst = parseFloat(document.getElementById("gst").value);
      const result = document.getElementById("result");

      if (isNaN(mrp) || isNaN(discount) || isNaN(gst)) {
        result.innerHTML = "❌ Please enter valid values.";
        result.style.color = "red";
        return;
      }

      const discountAmount = (mrp * discount) / 100;
      const discountedPrice = mrp - discountAmount;

      // Remove GST from discounted price
      const finalPrice = discountedPrice / (1 + gst / 100);
      const gstRemoved = discountedPrice - finalPrice;

      result.style.color = "#222";
      result.innerHTML = `
        💸 Discounted Price (before GST removal): ₹${discountedPrice.toFixed(2)}<br>
        🧾 GST Removed (${gst}%): ₹${gstRemoved.toFixed(2)}<br>
        ✅ <strong>Final Price after GST Removed: ₹${finalPrice.toFixed(2)}</strong><br>
        🔻 Total Savings from MRP: ₹${(mrp - finalPrice).toFixed(2)}
      `;
    }
  </script>

</body>
</html>
