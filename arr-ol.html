<!DOCTYPE html>
<html>
<head>
	<title>Array to Ordered List</title>
</head>
<body>
<h2>Array to Ordered List</h2>
<ol id="myList"></ol>

<script>
	const items = [ "dbms", "mongodb", "nodejs", "reactjs"];
	const list = document.getElementById("myList");
	for (let i = 0; i < items.length; i++) {
  	let listItem = document.createElement("li");
  	listItem.textContent = items[i];
  	list.appendChild(listItem);
}
</script>
</body>
</html>
